name: Run Discord Bot

on:
  schedule:
    # Run every day at 6 PM IST (12:30 PM UTC)
    - cron: '30 12 * * *'
  workflow_dispatch:  # Allow manual trigger from GitHub UI

jobs:
  run-bot:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'
      
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg
      
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install discord.py==2.4.0 python-dotenv PyNaCl
      
      - name: Check for audio file
        run: |
          if [ -f "audio_final.opus" ]; then
            echo "✅ Audio file found"
            ls -lh audio_final.opus
          else
            echo "⚠️  Audio file not found - will use AUDIO_URL if provided"
          fi
      
      - name: Run Discord bot
        env:
          DISCORD_TOKEN: ${{ secrets.DISCORD_TOKEN }}
          VOICE_CHANNEL_ID: ${{ secrets.VOICE_CHANNEL_ID }}
          AUDIO_FILE: audio_final.opus
          AUDIO_URL: ${{ secrets.AUDIO_URL }}
          DURATION_MINUTES: 60
        run: |
          echo "Starting Discord bot..."
          echo "Duration: 60 minutes"
          python main.py
        timeout-minutes: 90  # Allow up to 90 minutes total (60 min music + buffer)
