name: Run Discord Bot with Lavalink

on:
  schedule:
    # Run every day at 6 PM IST (12:30 PM UTC)
    - cron: '30 12 * * *'
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'
      
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg libopus0 libsodium23
      
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install discord.py==2.4.0 wavelink==3.4.0 python-dotenv PyNaCl
      
      - name: Run Discord bot with Lavalink
        env:
          DISCORD_TOKEN: ${{ secrets.DISCORD_TOKEN }}
          VOICE_CHANNEL_ID: ${{ secrets.VOICE_CHANNEL_ID }}
          AUDIO_URL: ${{ secrets.AUDIO_URL }}
          DURATION_MINUTES: 60
        run: |
          echo "🚀 Starting Discord bot with Lavalink audio relay..."
          python main.py
        timeout-minutes: 90
